name: test

on: [push, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git \
            make \
            g++ \
            build-essential \
            autoconf \
            bison \
            flex \
            gperf \
            ca-certificates \
            python3 \
            python3-dev \
            python3-pip

      - name: Build and install Icarus Verilog 13
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          git clone https://github.com/steveicarus/iverilog.git
          cd iverilog

          if git rev-parse --verify v13_0 >/dev/null 2>&1; then
            git checkout v13_0
          else
            git checkout master
          fi

          sh autoconf.sh
          ./configure
          make -j"$(nproc)"
          sudo make install

          which iverilog
          iverilog -V
          which vvp
          vvp -V

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        shell: bash
        run: |
          set -euxo pipefail
          pip install -r test/requirements.txt
          pip freeze | grep -E 'cocotb|cocotbext|pytest' || true

      - name: Run tests
        shell: bash
        run: |
          set -euxo pipefail
          cd test
          make clean
          make
          ! grep failure results.xml

      - name: Test Summary
        uses: test-summary/action@v2.3
        with:
          paths: "test/results.xml"
        if: always()

      - name: Upload waveform and test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test/tb.fst
            test/results.xml
            test/output/*
